version: '3.8'

services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: irq-cloudstack-mcp
    image: cloudstack-mcp:latest
    environment:
      # CloudStack API Configuration
      - CLOUDSTACK_API_URL=${CLOUDSTACK_API_URL}
      - CLOUDSTACK_API_KEY=${CLOUDSTACK_API_KEY}
      - CLOUDSTACK_SECRET_KEY=${CLOUDSTACK_SECRET_KEY}
      - CLOUDSTACK_TIMEOUT=${CLOUDSTACK_TIMEOUT:-30000}
      - CLOUDSTACK_REJECT_UNAUTHORIZED=${CLOUDSTACK_REJECT_UNAUTHORIZED:-false}

      # HTTP Server Configuration
      - HTTP_PORT=3000
      - HTTP_HOST=0.0.0.0
      - NODE_ENV=production
    volumes:
      # Mount API keys configuration (read-only)
      - ./config/api-keys.json:/app/config/api-keys.json:ro
      # Mount logs directory (read-write)
      - ./logs:/app/logs
    networks:
      - mcp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: cloudstack-mcp-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Nginx configuration
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # SSL certificates (Let's Encrypt or custom)
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      mcp-server:
        condition: service_healthy
    networks:
      - mcp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  mcp-network:
    driver: bridge
