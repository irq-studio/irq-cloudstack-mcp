name: Bug Report
description: Report a bug or unexpected behavior in CloudStack MCP Server
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below to help us investigate.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what went wrong
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Configure MCP server with...
        2. Call tool '...'
        3. Observe error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: Describe what should have happened
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
      placeholder: Describe what actually happened
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - MCP Server
        - CLI Interface
        - Virtual Machine Tools
        - Storage Tools
        - Network Tools
        - Monitoring Tools
        - Admin Tools
        - Security Tools
        - CloudStack Client
        - Other/Unknown
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Information about your environment
      value: |
        - Node.js version:
        - OS:
        - MCP Server version:
        - CloudStack version:
        - MCP Client (Claude Code, etc.):
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Please paste any relevant log output
      render: shell
      placeholder: |
        Paste logs here (stderr output, error messages, etc.)

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Your configuration (REDACT sensitive information like API keys)
      render: json
      placeholder: |
        {
          "CLOUDSTACK_API_URL": "https://your-server/client/api",
          "CLOUDSTACK_TIMEOUT": "30000"
        }

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I have redacted all sensitive information (API keys, passwords, etc.)
          required: true
        - label: I have included relevant logs and error messages
          required: true
