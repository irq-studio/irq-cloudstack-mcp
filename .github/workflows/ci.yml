name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type checking
        run: npx tsc --noEmit

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          CLOUDSTACK_API_URL: https://test.example.com/client/api
          CLOUDSTACK_API_KEY: test-key-32-characters-long-12
          CLOUDSTACK_SECRET_KEY: test-secret-key

      - name: Run test coverage
        run: NODE_OPTIONS="--max-old-space-size=4096" npm run test:coverage
        env:
          CLOUDSTACK_API_URL: https://test.example.com/client/api
          CLOUDSTACK_API_KEY: test-key-32-characters-long-12
          CLOUDSTACK_SECRET_KEY: test-secret-key

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.node-version == '20.x'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Build project
        run: npm run build

      - name: Test CLI
        run: npm run cli -- --help
        env:
          CLOUDSTACK_API_URL: https://test.example.com/client/api
          CLOUDSTACK_API_KEY: test-key-32-characters-long-12
          CLOUDSTACK_SECRET_KEY: test-secret-key

  audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for known vulnerabilities
        run: npm audit --omit=dev --audit-level=high
