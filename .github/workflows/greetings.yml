name: Greetings

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  greeting:
    name: Greet New Contributors
    runs-on: ubuntu-latest

    steps:
      - name: Greet first-time contributors
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          issue-message: |
            Thanks for opening your first issue in the CloudStack MCP Server project!

            A maintainer will review your issue and respond as soon as possible.

            In the meantime, please ensure you've:
            - Provided all requested information in the issue template
            - Searched for similar existing issues
            - Redacted any sensitive information (API keys, passwords, etc.)

            We appreciate your contribution!

          pr-message: |
            Thanks for opening your first pull request in the CloudStack MCP Server project!

            A maintainer will review your PR and provide feedback.

            Please ensure:
            - All tests pass
            - Code follows project style guidelines
            - Documentation is updated if needed
            - The PR description clearly explains the changes

            We appreciate your contribution!
